name: journal-microservices

services:
  # ---------------- Infrastructure ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [journalnet]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"        # external listener, for tools on the host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: INTERNAL for service-to-broker traffic inside the compose network,
      # EXTERNAL for clients on the host machine.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks: [journalnet]

  # ---------------- Microservices ----------------
  # NOTE: MongoDB is external (MongoDB Atlas) - see MONGODB_URI in .env. No local mongo container.
  user-service:
    build: ./user-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI must be set in .env (your Atlas connection string)}
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
    networks: [journalnet]

  journal-service:
    build: ./journal-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI must be set in .env (your Atlas connection string)}
      KAFKA_BROKER: kafka:29092
      # MUST equal user-service's secret so its JWTs validate here.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks: [journalnet]

  notification-service:
    build: ./notification-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      KAFKA_BROKER: kafka:29092
    networks: [journalnet]

networks:
  journalnet:
    driver: bridge
